services:
  # Backend API (Pre-built from GHCR, MongoDB Atlas via MONGO_URI)
  backend:
    image: ghcr.io/tiny-optics/doctors-backend:latest
    container_name: doctors_backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - APP_ENV=production
      - MONGO_URI=${MONGO_URI}
      - BLUEPRINT_DB_DATABASE=${BLUEPRINT_DB_DATABASE:-doctors_workspace}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - sop_uploads:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - doctors_network

  # Frontend (Pre-built from GHCR)
  frontend:
    image: ghcr.io/tiny-optics/doctors-frontend:latest
    container_name: doctors_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - doctors_network

volumes:
  sop_uploads:
    driver: local

networks:
  doctors_network:
    driver: bridge
