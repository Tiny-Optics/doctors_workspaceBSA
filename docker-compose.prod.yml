services:
  # Backend API (Go, MongoDB Atlas via MONGO_URI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: doctors_backend
    restart: unless-stopped
    environment:
      - PORT=8080
      - APP_ENV=production
      - MONGO_URI=${MONGO_URI}
      - BLUEPRINT_DB_DATABASE=${BLUEPRINT_DB_DATABASE:-doctors_workspace}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - sop_uploads:/app/uploads
    ports:
      - "8080:8080"
    networks:
      - doctors_network

  # Frontend (Vue.js with Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: doctors_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - doctors_network

volumes:
  sop_uploads:
    driver: local

networks:
  doctors_network:
    driver: bridge
